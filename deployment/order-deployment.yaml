apiVersion: v1
kind: ConfigMap
metadata:
  name: order-config
  namespace: default
data:
  GO_ENV: "online"
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: default
  labels:
    app: order
spec:
  selector:
    app: order
  ports:
    - name: grpc
      port: 8085
      targetPort: 8085
    - name: opentelemetry
      port: 4317
      targetPort: 4317
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-deployment
  namespace: default
  labels:
    app: order
spec:
  # Pod 数量
  replicas: 2
  selector:
    matchLabels:
      app: order
  template:
    metadata:
      labels:
        app: order
    spec:
      containers:
        - name: order
          # 镜像地址, Dockefile构建的镜像
          image: order-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
              name: grpc
            - containerPort: 4317
              name: opentelemetry
            - containerPort: 8095
              name: health
          env:
            - name: GO_ENV
              valueFrom:
                configMapKeyRef:
                  name: order-config
                  key: GO_ENV
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8095
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8095
            initialDelaySeconds: 5
            periodSeconds: 10