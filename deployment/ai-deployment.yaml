apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-config
  namespace: default
data:
  GO_ENV: "online"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: default
  labels:
    app: ai
spec:
  selector:
    app: ai
  ports:
    - name: grpc
      port: 8088
      targetPort: 8088
    - name: opentelemetry
      port: 4317
      targetPort: 4317
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-deployment
  namespace: default
  labels:
    app: ai
spec:
  # Pod 数量
  replicas: 2
  selector:
    matchLabels:
      app: ai
  template:
    metadata:
      labels:
        app: ai
    spec:
      containers:
        - name: ai
          # 镜像地址, Dockefile构建的镜像
          image: ai-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8088
              name: grpc
            - containerPort: 4317
              name: opentelemetry
            - containerPort: 8098
              name: health
          env:
            - name: GO_ENV
              valueFrom:
                configMapKeyRef:
                  name: ai-config
                  key: GO_ENV
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8098
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8098
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: ai-deployment-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-deployment
  minReplicas: 5
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
