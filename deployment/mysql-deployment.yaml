apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-initdb-config
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS `auth` DEFAULT CHARACTER SET = 'utf8mb4';
    CREATE DATABASE IF NOT EXISTS `cart` DEFAULT CHARACTER SET = 'utf8mb4';
    CREATE DATABASE IF NOT EXISTS `checkout` DEFAULT CHARACTER SET = 'utf8mb4';
    CREATE DATABASE IF NOT EXISTS `gateway` DEFAULT CHARACTER SET = 'utf8mb4';
    CREATE DATABASE IF NOT EXISTS `order` DEFAULT CHARACTER SET = 'utf8mb4';
    CREATE DATABASE IF NOT EXISTS `payment` DEFAULT CHARACTER SET = 'utf8mb4';
    CREATE DATABASE IF NOT EXISTS `product` DEFAULT CHARACTER SET = 'utf8mb4';
    CREATE DATABASE IF NOT EXISTS `user` DEFAULT CHARACTER SET = 'utf8mb4';
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: standard
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
spec:
  selector:
    app: mysql
  ports:
  - protocol: TCP
    port: 3306
    targetPort: 3306
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "root"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: mysql-persistent-storage
          mountPath: /var/lib/mysql
        - name: mysql-initdb
          mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: mysql-persistent-storage
        persistentVolumeClaim:
          claimName: mysql-pvc
      - name: mysql-initdb
        configMap:
          name: mysql-initdb-config