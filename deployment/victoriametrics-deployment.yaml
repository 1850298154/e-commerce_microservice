apiVersion: v1
kind: Service
metadata:
  name: victoriametrics-service
spec:
  selector:
    app: victoriametrics
  ports:
  - name: http
    port: 8428
    targetPort: 8428
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoriametrics
spec:
  selector:
    matchLabels:
      app: victoriametrics
  template:
    metadata:
      labels:
        app: victoriametrics
    spec:
      containers:
      - name: victoriametrics
        image: victoriametrics/victoria-metrics
        args:
        - '--storageDataPath=/storage'
        - '--graphiteListenAddr=:2003'
        - '--opentsdbListenAddr=:4242'
        - '--httpListenAddr=:8428'
        - '--influxListenAddr=:8089'
        ports:
        - containerPort: 8428
        - containerPort: 8089
        - containerPort: 2003
        - containerPort: 4242