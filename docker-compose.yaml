version: '3'

services:
  consul:
    image: 'hashicorp/consul'
    ports:
      - "8500:8500"

  mysql:
    image: "mysql:8.0"
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - ./db/sql/ini:/docker-entrypoint-initdb.d
      - ./data/mysql-data:/var/lib/mysql  # 使用相对路径来存储 MySQL 数据

  redis:
    image: 'redis:latest'
    ports:
      - "6379:6379"

  meilisearch:
    image: 'getmeili/meilisearch:v1.12.5'
    ports:
      - "7700:7700"  # Meilisearch 的默认端口
    environment:
      - MEILI_MASTER_KEY=abc123  # 设置主密钥

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001" # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./app/product/data/minio-data:/data  # 使用相对路径来存储 MinIO 数据
