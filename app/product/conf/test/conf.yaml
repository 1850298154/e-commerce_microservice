kitex:
  service: "product"
  address: "127.0.0.1:8083"
  log_level: info
  log_file_name: "log/kitex.log"
  log_max_size: 10
  log_max_age: 3
  log_max_backups: 50
  max_connections: 1000
  max_qps: 1000

registry:
  registry_address:
    - 127.0.0.1:8500
  username: ""
  password: ""

mysql:
  db_host: "127.0.0.1"
  db_port: 3306
  db_user: "root"
  db_password: "root"
  db_name: "product"

  dsn: "%s:%s@tcp(%s:%d)/%s?charset=utf8mb4&parseTime=True&loc=Local"
  max_idle_conns: 20
  max_open_conns: 100
  conn_max_lifetime: 10

redis:
  address: "127.0.0.1:6379"
  username: ""
  password: ""
  db: 0

meili:
  address: "http://localhost:7700"
  api_key: "abc123"

minio: # minio 存储配置
  accessKey:  minioadmin  # 用于身份验证的访问密钥
  secretKey:  minioadmin  # 用于身份验证的秘密密钥
  secure: false # 是否使用 HTTPS，false 表示使用 HTTP
  address: 127.0.0.1:9000 # MinIO 服务的地址和端口
  bucket: mall-minio # 用于存储对象的桶名称
  domain: http://127.0.0.1:9000/ # 对外访问的域名
  tempDir: tmp # 临时对象存放目录名

open_telemetry:
  endpoint: "127.0.0.1:4317"

health_check:
  addr: ":8095"