hertz:
  service: "gateway"
  address: "127.0.0.1:8080"
  enable_pprof: true
  enable_gzip: true
  enable_access_log: true
  log_level: info
  log_file_name: "log/hertz.log"
  log_max_size: 10
  log_max_age: 3
  log_max_backups: 50
  registry_addr: "localhost:8500"


mysql:
  dsn: "root:root@tcp(127.0.0.1:3306)/user?charset=utf8mb4&parseTime=True&loc=Local"


redis:
  address: "127.0.0.1:6379"
  username: ""
  password: ""
  db: 0

open_telemetry:
  endpoint: "127.0.0.1:4317"

health_check:
  addr: "127.0.0.1:8090"

security:
  public_routes:
    - "/auth/token"
    - "/auth/verify"
    - "/auth/renew"
    - "/user/register"
    - "/user/login"
    - "/products"
    - "/product"
    - "/product/search"
    - "/checkout"

