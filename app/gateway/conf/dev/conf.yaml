hertz:
  service: "gateway"
  address: ":8080"
  enable_pprof: true
  enable_gzip: true
  enable_access_log: true
  log_level: info
  log_file_name: "log/hertz.log"
  log_max_size: 10
  log_max_age: 3
  log_max_backups: 50
  registry_addr: "localhost:8500"

mysql:
  db_host: "127.0.0.1"
  db_port: 3306
  db_user: "root"
  db_password: "root"
  db_name: "user"

  dsn: "%s:%s@tcp(%s:%d)/%s?charset=utf8mb4&parseTime=True&loc=Local"
  max_idle_conns: 20
  max_open_conns: 100
  conn_max_lifetime: 10

redis:
  address: "127.0.0.1:6379"
  username: ""
  password: ""
  db: 0

open_telemetry:
  endpoint: ":4317"

health_check:
  addr: ":8090"

security:
  public_routes:
    - "/auth/token"
    - "/auth/verify"
    - "/auth/renew"
    - "/user/register"
    - "/user/login"
    - "/products"
    - "/product/search"