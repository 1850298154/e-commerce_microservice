hertz:
  service: "gateway"
  address: ":8080"
  enable_pprof: false
  enable_gzip: true
  enable_access_log: true
  log_level: info
  log_file_name: "log/hertz.log"
  log_max_size: 10
  log_max_age: 3
  log_max_backups: 50
  registry_addr: "consul-service:8500"

mysql:
  dsn: "%s:%s@tcp(%s:3306)/%s?charset=utf8mb4&parseTime=True&loc=Local"

redis:
  address: "redis-service:6379"
  username: ""
  password: ""
  db: 0

open_telemetry:
  endpoint: "otel-collector-service:4317"

health_check:
  addr: ":8090"

security:
  public_routes:
    - "/auth/token"
    - "/auth/verify"
    - "/auth/renew"
    - "/user/register"
    - "/user/login"
    - "/products"
    - "/product"
    - "/product/search"
    - "/checkout"
