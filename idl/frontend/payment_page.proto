syntax = "proto3";

package frontend.payment;

option go_package = "frontend/payment";

service PaymentService {
    rpc Charge(ChargeReq) returns (ChargeResp) {}
    rpc CancelPayment(CancelPaymentReq) returns (CancelPaymentResp) {}
    //rpc TimedCancelPayment(TimedCancelPaymentReq) returns (TimedCancelPaymentResp) {}
}

message CreditCardInfo {
    string credit_card_number = 1 [(api.body) = "credit_card_number"];
    int32 credit_card_cvv = 2 [(api.body) = "credit_card_cvv"];
    int32 credit_card_expiration_year = 3 [(api.body) = "credit_card_expiration_year"];
    int32 credit_card_expiration_month = 4 [(api.body) = "credit_card_expiration_month"];
}

message ChargeReq {
    float amount = 1 [(api.body) = "amount"];
    CreditCardInfo credit_card = 2 [(api.body) = "credit_card"];
    string order_id = 3 [(api.body) = "order_id"];
    uint32 user_id = 4 [(api.body) = "user_id"];
}

message ChargeResp {
    string transaction_id = 1 [(api.body) = "transaction_id"];
}

message CancelPaymentReq {
    string transaction_id = 1 [(api.body) = "transaction_id"];
    uint32 user_id = 2 [(api.body) = "user_id"];
}

message CancelPaymentResp {
    bool success = 1 [(api.body) = "success"];
}

